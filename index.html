<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>K-tube API</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#fff;
  color:#000;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}

#overlay{
  text-align:center;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

h1{
  font-size:36px;
  margin-bottom:10px;
}

p{
  margin:6px 0;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

#statusOutput{
  margin-top:20px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="overlay">
  <h1>K-Tube API</h1>

  <p id="version"></p>
  <p>APIインターフェース</p>
  <p>
    状態確認やデバッグはコンソールから操作できます
  </p>

  <button onclick="checkStatus()">API状態を確認</button>
  <div id="statusOutput"></div>
</div>

<script>
/* ===== モード ===== */
let MODE = localStorage.getItem("mode") || "api";

window.mode = function(name){
  if(!name){
    console.log("mode('api')");
    console.log("mode('debug')");
    return;
  }
  localStorage.setItem("mode", name);
  location.reload();
};

/* ===== Version ===== */
function computeVersion(){
  const digits = location.href.match(/\d/g);
  return digits ? digits.reduce((a,b)=>a+Number(b),0) : 0;
}
document.getElementById("version").textContent = "バージョン: " + computeVersion();

/* ===== API一覧 ===== */
const apis = [
"https://nyc1.iv.ggtyler.dev",
"https://invid-api.poketube.fun",
"https://cal1.iv.ggtyler.dev",
"https://invidious.nikkosphere.com",
"https://lekker.gay",
"https://invidious.f5.si",
"https://invidious.lunivers.trade"
];

/* ===== APIチェック（最速1つだけ） ===== */
async function checkStatus(){
  const out = document.getElementById("statusOutput");
  out.textContent = "確認中...";

  const start = performance.now();

  const promises = apis.map(api =>
    fetch(api + "/api/v1/stats")
      .then(res=>{
        if(!res.ok) throw new Error();
        return performance.now();
      })
  );

  try{
    const first = await Promise.any(promises);
    const time = Math.round(first - start);

    out.textContent = `正常に動作中（応答速度: ${time}ms）`;
  }catch{
    out.textContent = "すべてのAPIが応答しませんでした";
  }
}

/* ===== debugモード ===== */
if(MODE === "debug"){
  document.body.innerHTML = `
  <div style="padding:20px">
    <h2>デバッグモード</h2>
    <input id="url" placeholder="YouTube URL">
    <button onclick="start()">取得</button>
    <div id="status"></div>
    <div id="result"></div>
  </div>
  `;
}

/* ===== 既存処理 ===== */
function getVideoId(url){
  let m=url.match(/v=([^&]+)/); if(m)return m[1];
  m=url.match(/youtu\.be\/([^?]+)/); if(m)return m[1];
  return null;
}

async function start(){
  const url=document.getElementById("url").value;
  const id=getVideoId(url);
  if(!id){alert("URLが正しくない");return;}

  document.getElementById("status").innerText="取得中...";

  try{
    const res=await fetch(`/.netlify/functions/video?v=${id}`);
    const data=await res.json();

    document.getElementById("status").innerText="取得成功";

    document.getElementById("result").innerText=
      JSON.stringify(data,null,2);

  }catch{
    document.getElementById("status").innerText="取得失敗";
  }
}
</script>

</body>
</html>
