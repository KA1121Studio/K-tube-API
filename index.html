<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>K-tube API</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#fff;
  color:#000;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 共通 */
button{
  padding:10px 20px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{opacity:0.8;}

/* API画面 */
#overlay{
  text-align:center;
  animation: fadeIn 1.5s ease forwards;
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

#statusOutput{
  margin-top:20px;
  font-size:16px;
}

/* debug UI */
.card{
  background:#fff;
  border:1px solid #ddd;
  padding:20px;
  border-radius:8px;
}
pre{
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
/* ===== モード ===== */
let MODE = localStorage.getItem("mode") || "api";

window.mode = function(name){
  if(!name){
    console.log("mode('api')");
    console.log("mode('debug')");
    return;
  }
  localStorage.setItem("mode", name);
  location.reload();
};

/* ===== Version ===== */
function computeVersion(){
  const digits = location.href.match(/\d/g);
  return digits ? digits.reduce((a,b)=>a+Number(b),0) : 0;
}

/* ===== API一覧 ===== */
const apis = [
"https://nyc1.iv.ggtyler.dev",
"https://invid-api.poketube.fun",
"https://cal1.iv.ggtyler.dev",
"https://invidious.nikkosphere.com",
"https://lekker.gay",
"https://invidious.f5.si",
"https://invidious.lunivers.trade"
];

/* ===== UI描画 ===== */
if(MODE === "debug"){
  document.getElementById("app").innerHTML = `
  <div style="max-width:800px;margin:40px auto;width:100%">
    <h1>デバッグモード</h1>
    <p style="color:#666">動画情報を取得して詳細を確認できます</p>

    <div style="display:flex;gap:10px;margin-top:20px">
      <input id="url" placeholder="YouTube URL"
        style="flex:1;padding:10px;border:1px solid #ccc">
      <button onclick="start()">取得</button>
    </div>

    <div id="status" style="margin-top:15px;font-weight:bold"></div>
    <div id="result" style="margin-top:20px"></div>
  </div>
  `;
}else{
  document.getElementById("app").innerHTML = `
  <div id="overlay">
    <h1>K-Tube API</h1>
    <p>バージョン: ${computeVersion()}</p>
    <p>APIインターフェース</p>
    <p>コンソールでモード切替できます</p>

    <button onclick="checkStatus()">API状態を確認</button>
    <div id="statusOutput"></div>
  </div>
  `;
}

/* ===== APIチェック ===== */
async function checkStatus(){
  const out = document.getElementById("statusOutput");
  out.textContent = "確認中...";

  const start = performance.now();

  const promises = apis.map(api =>
    fetch(api + "/api/v1/stats")
      .then(res=>{
        if(!res.ok) throw new Error();
        return performance.now();
      })
  );

  try{
    const first = await Promise.any(promises);
    const time = Math.round(first - start);

    out.textContent = `正常に動作中（応答速度: ${time}ms）`;
  }catch{
    out.textContent = "すべてのAPIが応答しませんでした";
  }
}

/* ===== 共通処理 ===== */
function getVideoId(url){
  let m=url.match(/v=([^&]+)/); if(m)return m[1];
  m=url.match(/youtu\.be\/([^?]+)/); if(m)return m[1];
  return null;
}

/* ===== デバッグ取得 ===== */
async function start(){
  const url=document.getElementById("url").value;
  const id=getVideoId(url);

  if(!id){
    alert("URLが正しくない");
    return;
  }

  const status = document.getElementById("status");
  const result = document.getElementById("result");

  status.innerHTML = "取得中... ⏳";
  result.innerHTML = "";

  try{
    const startTime = performance.now();

    const res=await fetch(`/.netlify/functions/video?v=${id}`);
    const data=await res.json();

    const time = Math.round(performance.now() - startTime);

    status.innerHTML = `取得成功 ✅（${time}ms）`;

    const thumbnail = data.videoThumbnails?.pop()?.url || "";

    result.innerHTML = `
    <div class="card">

      <h2>${data.title}</h2>

      <img src="${thumbnail}" style="max-width:100%;cursor:pointer"
        onclick="window.open('https://youtube.com/watch?v=${id}')">

      <p><b>チャンネル:</b> ${data.author}</p>
      <p><b>再生数:</b> ${(data.viewCount||0).toLocaleString()}</p>
      <p><b>いいね:</b> ${(data.likeCount||0).toLocaleString()}</p>

      <details>
        <summary>説明文</summary>
        <pre>${data.description}</pre>
      </details>

      <details>
        <summary>字幕</summary>
        <pre>${JSON.stringify(data.captions,null,2)}</pre>
      </details>

      <details>
        <summary>生データ</summary>
        <pre>${JSON.stringify(data,null,2)}</pre>
      </details>

    </div>
    `;
  }catch(e){
    status.innerHTML = "取得失敗 ❌";
    result.innerHTML = `<pre>${e.message}</pre>`;
  }
}

/* ===== Enterで実行 ===== */
document.addEventListener("keydown",e=>{
  if(e.key==="Enter" && MODE==="debug") start();
});
</script>

</body>
</html>
