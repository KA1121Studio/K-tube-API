<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>K-tube API v2</title>

<style>
body{font-family:sans-serif;padding:40px;background:#fafafa;}
input{width:400px;padding:10px;margin-right:10px;}
button{padding:10px 20px;}
.video{margin-top:30px;background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
.video img{max-width:400px;cursor:pointer;}
.download a{display:inline-block;margin:5px 10px;padding:5px 10px;background:#4CAF50;color:#fff;border-radius:4px;text-decoration:none;}
.download a:hover{background:#45a049;}
pre{background:#f0f0f0;padding:10px;border-radius:4px;overflow-x:auto;}
h2,h3{margin-bottom:5px;}

#apiStatus div{
  padding:10px;
  margin:5px 0;
  background:#fff;
  border-radius:6px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- APIステータス -->
<div id="apiStatus"></div>

<!-- デバッグUI -->
<div id="debugUI">

<h1>K-tube API v2（debug）</h1>

<input id="url" placeholder="YouTube URL">
<button onclick="start()">取得</button>

<div id="status"></div>
<div id="result"></div>

</div>

<script>
/* ===== モード管理 ===== */
let MODE = localStorage.getItem("mode") || "api";

window.mode = function(name){
  if(!name){
    console.log("利用可能モード:");
    console.log("mode('api')");
    console.log("mode('debug')");
    return;
  }
  localStorage.setItem("mode", name);
  console.log("モード変更:", name);
  location.reload();
};

/* ===== APIリスト ===== */
const apis = [
"https://nyc1.iv.ggtyler.dev",
"https://invid-api.poketube.fun",
"https://cal1.iv.ggtyler.dev",
"https://invidious.nikkosphere.com",
"https://lekker.gay",
"https://invidious.f5.si",
"https://invidious.lunivers.trade"
];

/* ===== モード切替 ===== */
function applyMode(){
  const debugUI = document.getElementById("debugUI");
  const apiUI = document.getElementById("apiStatus");

  if(MODE === "debug"){
    debugUI.style.display = "block";
    apiUI.style.display = "none";
  }else{
    debugUI.style.display = "none";
    apiUI.style.display = "block";
    checkApis();
  }
}
applyMode();

/* ===== APIステータス ===== */
async function checkApis(){
  const box = document.getElementById("apiStatus");
  box.innerHTML = "<h2>API ステータス</h2>";

  for(const api of apis){
    const div = document.createElement("div");
    div.innerText = api + " ... チェック中";
    box.appendChild(div);

    const start = performance.now();

    try{
      const res = await fetch(api + "/api/v1/stats");
      const time = Math.round(performance.now() - start);

      if(res.ok){
        div.innerText = `${api} ✅ OK (${time}ms)`;
        div.style.color = "green";
      }else{
        throw new Error();
      }
    }catch{
      div.innerText = api + " ❌ NG";
      div.style.color = "red";
    }
  }
}

/* ===== 既存ロジック ===== */
function getVideoId(url){
  let match = url.match(/v=([^&]+)/); if(match) return match[1];
  match = url.match(/youtu\.be\/([^?]+)/); if(match) return match[1];
  match = url.match(/shorts\/([^?]+)/); if(match) return match[1];
  return null;
}

async function fetchVideo(videoId){
  return fetch(`/.netlify/functions/video?v=${videoId}`)
    .then(res=>{
      if(!res.ok) throw new Error("API失敗");
      return res.json();
    });
}

function extractData(data){
  return {
    title:data.title,
    description:data.description,
    channelName:data.author,
    channelId:data.authorId,
    viewCount:data.viewCount || 0,
    likeCount:data.likeCount || 0,
    published:new Date(data.published*1000).toLocaleString(),
    thumbnail:data.videoThumbnails?.[data.videoThumbnails.length-1]?.url||"",
    lengthSeconds:data.lengthSeconds || 0,
    tags:data.keywords||[],
    liveNow:data.liveNow,
    captions:data.captions||[],
    videoFormats:data.formatStreams||[],
    adaptiveFormats:data.adaptiveFormats||[]
  };
}

function createDownloadLinks(data){
  let html = "<h3>ダウンロードリンク</h3><div class='download'>";

  data.videoFormats.forEach(f=>{
    html += `<a href="${f.url}" target="_blank">${f.qualityLabel||f.resolution}</a>`;
  });

  data.adaptiveFormats.filter(f=>f.type.includes("video")).forEach(f=>{
    html += `<a href="${f.url}" target="_blank">${f.resolution} (video only)</a>`;
  });

  data.adaptiveFormats.filter(f=>f.type.includes("audio")).forEach(f=>{
    html += `<a href="${f.url}" target="_blank">${f.audioQuality||"audio only"}</a>`;
  });

  html += "</div>";
  return html;
}

async function start(){
  const url = document.getElementById("url").value;
  const videoId = getVideoId(url);

  if(!videoId){
    alert("URLが正しくない");
    return;
  }

  document.getElementById("result").innerHTML="";
  document.getElementById("status").innerHTML="取得中... ⏳";

  try{
    const data = await fetchVideo(videoId);
    const info = extractData(data);

    let html = `
    <div class="video">
      <h2>${info.title}</h2>
      <img src="${info.thumbnail}" onclick="window.open('https://youtube.com/watch?v=${videoId}')">
      <p>チャンネル: ${info.channelName}</p>
      <p>再生数: ${info.viewCount.toLocaleString()} | 👍 ${info.likeCount.toLocaleString()}</p>
      <p>投稿日: ${info.published}</p>

      ${createDownloadLinks(info)}

      <details>
      <summary>説明文</summary>
      <pre>${info.description}</pre>
      </details>

      <details>
      <summary>字幕</summary>
      <pre>${JSON.stringify(info.captions,null,2)}</pre>
      </details>

      <details>
      <summary>生データ</summary>
      <pre>${JSON.stringify(data,null,2)}</pre>
      </details>

    </div>`;

    document.getElementById("result").innerHTML = html;
    document.getElementById("status").innerHTML="取得成功 ✅";

  }catch(e){
    document.getElementById("status").innerHTML="取得失敗 ❌";
    document.getElementById("result").innerText = e.message;
  }
}

/* ===== APIモード ===== */
async function autoAPI(){
  const params = new URLSearchParams(location.search);
  const videoId = params.get("v");

  if(!videoId) return;

  document.body.innerText="Loading...";

  try{
    const data = await fetchVideo(videoId);
    const info = extractData(data);
    document.body.innerText = JSON.stringify(info,null,2);
  }catch{
    document.body.innerText="API Error";
  }
}
autoAPI();
</script>

</body>
</html>
