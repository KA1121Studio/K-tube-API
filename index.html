<html lang="ja"><head>
<meta charset="UTF-8">
<title>K-Tube API</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#fff;
}

#overlay{
  text-align:center;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

button{
  padding:10px 20px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{opacity:0.8;}

#statusOutput{
  margin-top:20px;
}
</style>
</head>

<body>

<div id="overlay">
  <h1>K-Tube API</h1>
  <p>バージョン: <span id="version">11</span></p>
  <p>APIインターフェース</p>
  <p>コンソールでモード切替できます</p>

  <button onclick="checkStatus()">API状態を確認</button>
  <div id="statusOutput">正常に動作中（応答速度: 260ms）</div>
</div>

<script>
/* ===== Version ===== */
function computeVersion(){
  const digits = location.href.match(/\d/g);
  return digits ? digits.reduce((a,b)=>a+Number(b),0) : 0;
}

document.getElementById("version").textContent = computeVersion();

/* ===== APIチェック ===== */
async function checkStatus(){
  const out = document.getElementById("statusOutput");
  out.textContent = "確認中...";

  const start = performance.now();

  // テスト用の動画ID（存在する適当なID）
  const testVideoId = "dQw4w9WgXcQ";

  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 5000);

    const promises = apis.map(api =>
      fetch(api + "/.netlify/functions/video?v=" + testVideoId, {
        method: "GET",
        signal: controller.signal
      }).then(res=>{
        if(!res.ok) throw new Error();
        return true;
      })
    );

    await Promise.any(promises);

    clearTimeout(timeout);

    const time = Math.round(performance.now() - start);
    out.textContent = `正常に動作中（応答速度: ${time}ms）`;

  }catch{
    out.textContent = "すべてのAPIが応答しませんでした";
  }
}
</script>



</body></html>
